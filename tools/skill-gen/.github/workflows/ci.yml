name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: skill-gen-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test skill-gen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: E2E tests
        run: bun run e2e-test

      - name: Check generated skills are up-to-date
        run: bun run check
