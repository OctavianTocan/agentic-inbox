pre-commit:
  commands:
    check:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css,md}'
      run: bun run biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files} && git update-index --again

    typecheck:
      glob: '*.{ts,tsx}'
      run: bun run typecheck

    test:
      glob: '*.{ts,tsx}'
      run: bun run test -- --run

post-merge:
  commands:
    install:
      glob: '{package.json,bun.lock}'
      run: bun install
