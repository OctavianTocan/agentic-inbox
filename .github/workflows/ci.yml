name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v3
      - run: bun install --frozen-lockfile
      - run: bun run ci

  sentrux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: curl -fsSL https://raw.githubusercontent.com/sentrux/sentrux/main/install.sh | sh
      - run: bun run arch:sentrux

  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v3
      - run: bun install --frozen-lockfile
      - run: bunx react-doctor@latest --no-telemetry
