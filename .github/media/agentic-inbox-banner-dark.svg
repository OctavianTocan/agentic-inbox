<svg width="2400" height="640" viewBox="0 0 2400 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Inbox</title>
  <desc id="desc">A human-guided AI inbox that triages routine email, drafts responses, pauses sensitive work for review, and records reversible actions.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0L0 0 0 32" fill="none" stroke="#2A2722" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
