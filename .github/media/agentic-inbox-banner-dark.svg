    </filter>
    <marker id="arrow-success" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0V9L8 4.5Z" fill="#58B785"/>
    </marker>
    <marker id="arrow-draft" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0V9L8 4.5Z" fill="#D4A06F"/>
    </marker>
    <marker id="arrow-review" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0V9L8 4.5Z" fill="#E08464"/>
    </marker>
  </defs>
