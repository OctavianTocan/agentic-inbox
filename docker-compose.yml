# Dev stack for Agentic Inbox.
#
# Default (`docker compose up -d` / `just up`) starts only Postgres. The api and
# web apps run on the host via Bun (`bun run dev:api`, `bun run dev`) against
# DATABASE_URL from .env — no containers needed for day-to-day dev.
#
# The optional `full` profile containerizes api + web too:
#   docker compose --profile full up -d --build
name: agentic-inbox

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agentic_inbox
      POSTGRES_PASSWORD: agentic_inbox
      POSTGRES_DB: agentic_inbox
    ports:
      # Host port is 5442 by default to avoid clashing with other local
      # Postgres instances; the URL in .env.example matches. Override with
      # DB_PORT if 5442 is taken.
      - "${DB_PORT:-5442}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      # Runs once on first boot to create the dedicated `agentic_inbox_test` database
      # the api test suite truncates against (never the live `agentic_inbox`).
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic_inbox -d agentic_inbox"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    profiles: ["full"]
    image: oven/bun:1.3.14-alpine
    working_dir: /app
    command: sh -c "bun install --ignore-scripts && bun run dev:api"
    environment:
      DATABASE_URL: postgres://agentic_inbox:agentic_inbox@db:5432/agentic_inbox
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-5.5}
      API_HOST: 0.0.0.0
      PORT: "8001"
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  web:
    profiles: ["full"]
    image: oven/bun:1.3.14-alpine
    working_dir: /app
    command: sh -c "bun install --ignore-scripts && bun run dev"
    environment:
      AGENTIC_INBOX_API_ORIGIN: http://api:8001
      PORT: "3003"
    ports:
      - "3003:3003"
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  db-data:
